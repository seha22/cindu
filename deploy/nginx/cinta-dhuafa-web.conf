server {
    listen 80;
    server_name rumahketan.online www.rumahketan.online;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + reverse proxy ke app
server {
    listen 443 ssl;
    server_name rumahketan.online www.rumahketan.online;

    ssl_certificate     /etc/letsencrypt/live/rumahketan.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rumahketan.online/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5000;  # <- sesuaikan port app
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}